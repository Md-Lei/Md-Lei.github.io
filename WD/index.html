<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Web Development Projects — Mike Dharen's Portfolio</title>
<link rel="icon" href="../resources/plogo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #1f1f2e;
    --text: #ffffff;
    --muted: #b3b3d1;
    --glass: rgba(255,255,255,0.06);
    --glass-strong: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.14);
    --glow-a: #6f6fce;
    --glow-b: #3d3d78;
    --glow-c: #9a8cf0;
    --radius: 22px;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }

  body{
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* ---- ambient glow field ---- */
  .glow{
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    z-index: 0;
    pointer-events: none;
    opacity: 0.55;
  }
  .glow-1{
    width: 46vw; height: 46vw;
    top: -14vw; left: -10vw;
    background: radial-gradient(circle at 30% 30%, var(--glow-a), transparent 70%);
    animation: float1 22s ease-in-out infinite;
  }
  .glow-2{
    width: 40vw; height: 40vw;
    bottom: -16vw; right: -8vw;
    background: radial-gradient(circle at 60% 60%, var(--glow-b), transparent 70%);
    animation: float2 26s ease-in-out infinite;
  }
  .glow-3{
    width: 26vw; height: 26vw;
    top: 40vh; right: 14vw;
    background: radial-gradient(circle, var(--glow-c), transparent 70%);
    opacity: 0.3;
    animation: float3 18s ease-in-out infinite;
  }
  @keyframes float1{ 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(3vw, 4vh); } }
  @keyframes float2{ 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(-3vw, -3vh); } }
  @keyframes float3{ 0%,100%{ transform: translate(0,0) scale(1); } 50%{ transform: translate(-2vw, 3vh) scale(1.08); } }
  @media (prefers-reduced-motion: reduce){
    .glow-1, .glow-2, .glow-3{ animation: none; }
  }

  .glass{
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }

  /* ---- nav ---- */
  .nav{
    position: sticky;
    top: 18px;
    z-index: 10;
    margin: 18px auto 0;
    max-width: 920px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    width: calc(100% - 32px);
  }
  .brand{
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
  }
  .brand img{ height: 26px; width: auto; border-radius: 6px; }

  .nav-links a{
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    padding: 8px 16px;
    border-radius: 999px;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .nav-links a:hover{ background: var(--glass-strong); color: var(--text); }
  .nav-links a:focus-visible{ outline: 2px solid var(--glow-c); outline-offset: 2px; }

  /* ---- layout ---- */
  main{
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: clamp(40px, 9vw, 80px) 16px 60px;
  }

  .hero{
    padding: clamp(28px, 5vw, 44px) clamp(24px, 6vw, 48px);
    text-align: center;
    margin-bottom: 28px;
  }
  .eyebrow{
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--glass-strong);
    border: 1px solid var(--glass-border);
    padding: 6px 16px;
    border-radius: 999px;
    margin-bottom: 18px;
  }
  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 6vw, 44px);
    margin: 0 0 10px;
    letter-spacing: -0.02em;
    background: linear-gradient(120deg, #ffffff, var(--glow-c));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hero p{
    color: var(--muted);
    font-size: clamp(14px, 2.2vw, 17px);
    max-width: 50ch;
    margin: 0 auto;
  }

  /* ---- gallery ---- */
  .gallery{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  @media (max-width: 760px){
    .gallery{ grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px){
    .gallery{ grid-template-columns: 1fr; }
  }

  .project{
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 14px;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }
  .project:hover{
    transform: translateY(-6px);
    border-color: rgba(154,140,240,0.5);
    box-shadow: 0 16px 44px rgba(0,0,0,0.4), 0 0 40px rgba(154,140,240,0.18);
  }
  .project:focus-visible{ outline: 2px solid var(--glow-c); outline-offset: 3px; }
  @media (prefers-reduced-motion: reduce){
    .project{ transition: border-color 0.2s ease, box-shadow 0.2s ease; }
    .project:hover{ transform: none; }
  }

  .project-thumb{
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--glass-border);
    aspect-ratio: 4 / 3;
    margin-bottom: 12px;
    background: var(--glass-strong);
  }
  .project-thumb img{
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .project-name{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
  }

  /* ---- home button ---- */
  .home-row{
    display: flex;
    justify-content: center;
    margin-top: 32px;
  }
  .btn-glass{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 26px;
    border-radius: 999px;
    background: var(--glass-strong);
    border: 1px solid var(--glass-border);
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .btn-glass:hover{ background: rgba(255,255,255,0.18); transform: translateY(-2px); }
  .btn-glass:focus-visible{ outline: 2px solid var(--glow-c); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce){
    .btn-glass:hover{ transform: none; }
  }

  footer{
    position: relative;
    z-index: 1;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px 16px 40px;
  }
</style>
</head>

<body>
  <div class="glow glow-1" aria-hidden="true"></div>
  <div class="glow glow-2" aria-hidden="true"></div>
  <div class="glow glow-3" aria-hidden="true"></div>

  <nav class="nav glass" aria-label="Primary">
    <div class="brand">
      <img src="../resources/plogo.png" alt="">
      MD-Luansing
    </div>
    <div class="nav-links">
      <a href="../index.html">Home</a>
    </div>
  </nav>

  <main>
    <section class="hero glass">
      <span class="eyebrow">Portfolio</span>
      <h1>Web Development Projects</h1>
      <p>A collection of web builds and coursework — click any project to open it.</p>
    </section>

    <section class="gallery">
      <a class="project glass" href="activity4/activity.html">
        <div class="project-thumb"><img src="images/Realme.png" alt="Realme 10"></div>
        <div class="project-name">Realme 10</div>
      </a>
      <a class="project glass" href="activity5/place.html">
        <div class="project-thumb"><img src="images/tanauan.png" alt="The Tanauan City"></div>
        <div class="project-name">The Tanauan City</div>
      </a>
      <a class="project glass" href="activity6/gallery.html">
        <div class="project-thumb"><img src="images/gallery.png" alt="Juan Luna's Gallery"></div>
        <div class="project-name">Juan Luna's Gallery</div>
      </a>
      <a class="project glass" href="activity7/index.html">
        <div class="project-thumb"><img src="images/ippo.png" alt="Hajime no Ippo"></div>
        <div class="project-name">Hajime no Ippo</div>
      </a>
      <a class="project glass" href="midterm1/index.html">
        <div class="project-thumb"><img src="images/queensGambit.png" alt="The Queen's Gambit"></div>
        <div class="project-name">The Queen's Gambit</div>
      </a>
      <a class="project glass" href="midterm2/banner.html">
        <div class="project-thumb"><img src="images/chess.png" alt="Beauty of Chess"></div>
        <div class="project-name">Beauty of Chess</div>
      </a>
    </section>

    <div class="home-row">
      <a class="btn-glass" href="../index.html">&larr; Home</a>
    </div>
  </main>

  <footer>&copy; 2024 Md-Lei.github.io</footer>
</body>
</html>
